<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<f:view contentType="text/html" locale="#{configuracionBean.locale}">
    <h:head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title><ui:insert name="titulo">#{msg['app.titulo']}</ui:insert></title>
        <link rel="icon" type="image/x-icon" href="#{request.contextPath}/assets/img/logo.png"/>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="#{request.contextPath}/assets/js/tailwind-config.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Playfair+Display:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.css"/>
        <link rel="stylesheet" href="#{request.contextPath}/assets/css/styles.css"/>
        <link rel="stylesheet" href="#{request.contextPath}/assets/css/estilosadic.css"/>
        <ui:insert name="headExtra"/>
    </h:head>
    <h:body class="font-body antialiased bg-slate-50 min-h-screen">
        
        <div class="min-h-screen flex flex-col md:flex-row">
            
            <!-- Left Side Admin Navigation Sidebar -->
            <aside class="w-full md:w-64 bg-slate-950 text-white flex flex-col justify-between shrink-0 border-r border-slate-800/60 sticky top-0 md:h-screen z-40 shadow-xl">
                <div>
                    <!-- Sidebar Header (Logo and brand) -->
                    <div class="px-6 py-5 border-b border-slate-900 flex items-center gap-3 select-none">
                        <img src="#{request.contextPath}/assets/img/logo/Logo_Inmobix.png" alt="InmobiX" class="h-8 w-auto"/>
                        <div class="flex flex-col">
                            <span class="text-sm font-black tracking-tight leading-none text-white">InmobiX</span>
                            <span class="text-[8px] font-black uppercase tracking-[0.25em] text-amber-400 mt-1">Admin Console</span>
                        </div>
                    </div>
                    
                    <!-- Sidebar Navigation Links -->
                    <nav class="px-4 py-6 space-y-1.5">
                        <a href="#{request.contextPath}/admin/dashboard.xhtml" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition-all no-underline #{facesContext.viewRoot.viewId eq '/admin/dashboard.xhtml' ? 'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10' : 'text-slate-400 hover:bg-slate-900 hover:text-white'}">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                            Resumen
                        </a>
                        <a href="#{request.contextPath}/admin/usuarios.xhtml" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition-all no-underline #{facesContext.viewRoot.viewId eq '/admin/usuarios.xhtml' ? 'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10' : 'text-slate-400 hover:bg-slate-900 hover:text-white'}">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            Usuarios
                        </a>
                        <a href="#{request.contextPath}/admin/propiedades.xhtml" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition-all no-underline #{facesContext.viewRoot.viewId eq '/admin/propiedades.xhtml' ? 'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10' : 'text-slate-400 hover:bg-slate-900 hover:text-white'}">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            Propiedades
                        </a>
                        <a href="#{request.contextPath}/admin/ubicaciones.xhtml" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition-all no-underline #{facesContext.viewRoot.viewId eq '/admin/ubicaciones.xhtml' ? 'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10' : 'text-slate-400 hover:bg-slate-900 hover:text-white'}">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            Ubicaciones
                        </a>
                        <a href="#{request.contextPath}/admin/auditoria.xhtml" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-xs transition-all no-underline #{facesContext.viewRoot.viewId eq '/admin/auditoria.xhtml' ? 'bg-amber-500 text-slate-950 shadow-md shadow-amber-500/10' : 'text-slate-400 hover:bg-slate-900 hover:text-white'}">
                            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            Auditoría
                        </a>
                    </nav>
                </div>
                
                <!-- Sidebar Footer (User details & actions) -->
                <div class="p-4 border-t border-slate-900 bg-slate-950">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-amber-400 border border-white/5 uppercase select-none text-xs shrink-0">
                            A
                        </div>
                        <div class="flex flex-col min-w-0">
                            <span class="text-xs font-bold text-white truncate">#{authBean.usuario.nombres}</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-wider truncate">Super Admin</span>
                        </div>
                    </div>
                    
                    <div class="flex gap-2">
                        <a href="#{request.contextPath}/index.xhtml" class="flex-1 py-2 rounded-xl bg-slate-900 hover:bg-slate-800 text-slate-300 hover:text-white transition-all text-[9px] font-black uppercase tracking-wider text-center no-underline border border-white/5">
                            Portal
                        </a>
                        <h:form class="flex-1">
                            <h:commandLink action="#{authBean.cerrarSesion}" value="Salir" class="w-full block py-2 rounded-xl bg-rose-950/30 hover:bg-rose-900/40 text-rose-400 transition-all text-[9px] font-black uppercase tracking-wider text-center no-underline border border-rose-900/10 cursor-pointer" />
                        </h:form>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <div class="flex-grow flex flex-col min-w-0">
                <!-- Content Viewport -->
                <main class="flex-grow p-6 md:p-8 lg:p-10 bg-slate-50/50">
                    <ui:insert name="contenido"/>
                </main>
                
                <!-- Simplistic Admin Footer -->
                <footer class="w-full bg-white border-t border-slate-200/50 py-5 text-center text-xs text-slate-400 shrink-0">
                    <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-2">
                        <p>&#169; 2026 InmobiX Portal Inmobiliario. Todos los derechos reservados.</p>
                        <p class="text-[9px] font-black uppercase tracking-wider text-slate-400">Consola de Control Seguro</p>
                    </div>
                </footer>
            </div>
            
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script src="#{request.contextPath}/assets/js/main.js"></script>
        <ui:insert name="scriptsExtra"/>
    </h:body>
</f:view>
</html>
