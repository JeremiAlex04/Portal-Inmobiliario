<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<ui:composition template="/WEB-INF/templates/plantilla_admin.xhtml">
    <ui:define name="titulo">#{msg['admin.propiedades']} - #{msg['app.titulo']}</ui:define>
    <ui:define name="contenido">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            
            <!-- Page Title Header -->
            <div class="mb-8 select-none">
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-amber-600 block mb-1">Control del Catálogo</span>
                <h1 class="font-title text-3xl font-light text-slate-900 leading-tight">Administración de Inmuebles</h1>
                <p class="text-xs text-slate-400 mt-1">Supervisión, cambio de estados y eliminación de publicaciones</p>
            </div>

            <!-- Header Filters Area -->
            <div class="bg-white rounded-3xl p-6 border border-slate-150 shadow-sm mb-6">
                <!-- Search & Filters Form -->
                <h:form class="flex flex-wrap gap-3 items-center">
                    <h:inputText value="#{adminBean.keyProp}" class="flex-1 min-w-[15rem] px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold focus:outline-none focus:border-black placeholder-slate-400" placeholder="Buscar por título o descripción..."/>
                    
                    <div class="relative shrink-0">
                        <h:selectOneMenu value="#{adminBean.operacionProp}" class="pl-3 pr-8 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:outline-none focus:border-black cursor-pointer appearance-none">
                            <f:selectItem itemValue="" itemLabel="Todas las operaciones"/>
                            <f:selectItem itemValue="VENTA" itemLabel="Operación: Venta"/>
                            <f:selectItem itemValue="ALQUILER" itemLabel="Operación: Alquiler"/>
                        </h:selectOneMenu>
                        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    
                    <h:commandButton value="#{msg['comun.buscar']}"
                        class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2.5 rounded-xl text-xs font-bold cursor-pointer transition-all hover:scale-[1.02] shadow-sm"/>
                </h:form>
            </div>

            <!-- Table Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-150 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b border-slate-100 text-slate-500 font-bold uppercase text-[9px] tracking-wider">
                            <tr>
                                <th class="px-6 py-4 text-left">ID</th>
                                <th class="px-6 py-4 text-left">Inmueble</th>
                                <th class="px-6 py-4 text-left">Ubicación</th>
                                <th class="px-6 py-4 text-left">Operación</th>
                                <th class="px-6 py-4 text-left">Precio base (USD)</th>
                                <th class="px-6 py-4 text-left">Estado</th>
                                <th class="px-6 py-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-slate-700 font-medium">
                            <c:forEach items="#{adminBean.propiedadesAdmin}" var="p">
                                <tr class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-6 py-4 text-slate-400 font-mono text-xs">##{p.id}</td>
                                    <td class="px-6 py-4 text-slate-900 font-bold max-w-xs truncate">#{p.titulo}</td>
                                    <td class="px-6 py-4 text-slate-600">#{p.distrito}</td>
                                    <td class="px-6 py-4">
                                        <span class="px-2.5 py-1 text-[9px] font-black uppercase tracking-wider rounded-full bg-slate-100 text-slate-800">
                                            #{p.operacion}
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-slate-900 font-bold">
                                        $ <h:outputText value="#{p.precioUsd}"><f:convertNumber pattern="#,##0"/></h:outputText>
                                    </td>
                                    <td class="px-6 py-4">
                                        <h:form class="inline-block relative">
                                            <h:selectOneMenu value="#{p.estado}" onchange="this.form.submit()" 
                                                class="pl-2 pr-7 py-1 bg-slate-50 border border-slate-250 rounded-lg text-[10px] font-bold text-slate-800 focus:outline-none focus:border-amber-500 cursor-pointer appearance-none">
                                                <f:selectItem itemValue="ACTIVO" itemLabel="ACTIVO"/>
                                                <f:selectItem itemValue="PAUSADO" itemLabel="PAUSADO"/>
                                                <f:selectItem itemValue="VENDIDO" itemLabel="VENDIDO"/>
                                                <f:selectItem itemValue="BORRADOR" itemLabel="BORRADOR"/>
                                                <f:selectItem itemValue="ELIMINADO" itemLabel="ELIMINADO"/>
                                            </h:selectOneMenu>
                                            <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none text-slate-400">
                                                <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                                            </div>
                                            <h:commandButton action="#{adminBean.cambiarEstadoPropiedad(p.id, p.estado)}" style="display:none"/>
                                        </h:form>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex justify-center items-center gap-2">
                                            <a href="#{request.contextPath}/detalle_propiedad.xhtml?id=#{p.id}" class="text-[9px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full bg-slate-100 text-slate-650 hover:bg-slate-200 transition-all">Ver Ficha</a>
                                            <h:form style="display:inline">
                                                <h:commandButton action="#{adminBean.eliminarPropiedad(p.id)}" value="Eliminar"
                                                    class="text-[9px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all cursor-pointer"/>
                                            </h:form>
                                        </div>
                                    </td>
                                </tr>
                            </c:forEach>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
