<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<ui:composition template="/WEB-INF/templates/plantilla.xhtml">
    <ui:define name="titulo">#{msg['admin.usuarios']} - #{msg['app.titulo']}</ui:define>
    <ui:define name="contenido">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">#{msg['admin.usuarios']}</h1>
                <button onclick="openModal('usuarioModal')" class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Nuevo Usuario</button>
            </div>

            <!-- Search -->
            <h:form class="flex gap-4 mb-6">
                <h:selectOneMenu value="#{adminBean.filtroUsuario}" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <f:selectItem itemValue="nombre" itemLabel="Nombre"/>
                    <f:selectItem itemValue="correo" itemLabel="Correo"/>
                    <f:selectItem itemValue="rol" itemLabel="Rol"/>
                </h:selectOneMenu>
                <h:inputText value="#{adminBean.busquedaUsuario}" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"/>
                <h:commandButton action="#{adminBean.buscarUsuarios}" value="#{msg['comun.buscar']}"
                    class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm"/>
            </h:form>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">ID</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Nombre</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Contacto</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Rol</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Estado</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <c:forEach items="#{adminBean.usuariosFiltrados}" var="u">
                                <tr class="border-t border-gray-50 hover:bg-gray-50">
                                    <td class="px-4 py-3">#{u.idUsuario}</td>
                                    <td class="px-4 py-3 font-medium">#{u.nombres} #{u.apellidos}</td>
                                    <td class="px-4 py-3">#{u.correo}</td>
                                    <td class="px-4 py-3">
                                        <h:form>
                                            <h:selectOneMenu value="#{u.idRol}" onchange="this.form.submit()"
                                                class="text-xs px-2 py-1 border border-gray-200 rounded">
                                                <f:selectItem itemValue="1" itemLabel="Comprador"/>
                                                <f:selectItem itemValue="3" itemLabel="Agente"/>
                                                <f:selectItem itemValue="5" itemLabel="Admin"/>
                                            </h:selectOneMenu>
                                            <h:commandButton action="#{adminBean.cambiarRolUsuario(u.idUsuario, u.idRol)}" style="display:none"/>
                                        </h:form>
                                    </td>
                                    <td class="px-4 py-3">
                                        <span class="px-2 py-1 text-xs rounded-full #{u.activo == 1 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                            #{u.activo == 1 ? 'Activo' : 'Bloqueado'}
                                        </span>
                                    </td>
                                    <td class="px-4 py-3">
                                        <div class="flex gap-2">
                                            <h:form style="display:inline">
                                                <h:commandButton action="#{adminBean.cambiarEstadoUsuario(u.idUsuario, u.activo == 1 ? 0 : 1)}"
                                                    value="#{u.activo == 1 ? 'Bloquear' : 'Activar'}"
                                                    class="text-xs px-2 py-1 rounded #{u.activo == 1 ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'}"/>
                                            </h:form>
                                            <h:form style="display:inline">
                                                <h:commandButton action="#{adminBean.eliminarUsuario(u.idUsuario)}" value="Eliminar"
                                                    class="text-xs px-2 py-1 rounded bg-red-50 text-red-600 hover:bg-red-100"/>
                                            </h:form>
                                        </div>
                                    </td>
                                </tr>
                            </c:forEach>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Nuevo Usuario Modal -->
        <div id="usuarioModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md">
                <h3 class="text-lg font-semibold mb-4">Nuevo Usuario</h3>
                <h:form>
                    <div class="space-y-3">
                        <div><h:inputText value="#{adminBean.nNombres}" placeholder="Nombres" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <div><h:inputText value="#{adminBean.nApellidos}" placeholder="Apellidos" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <div><h:inputText value="#{adminBean.nCorreo}" placeholder="Correo" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <div><h:inputSecret value="#{adminBean.nPassword}" placeholder="Contrase\u00F1a" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <div>
                            <h:selectOneMenu value="#{adminBean.nIdRol}" class="w-full px-3 py-2 border rounded-lg text-sm">
                                <f:selectItem itemValue="1" itemLabel="Comprador"/>
                                <f:selectItem itemValue="3" itemLabel="Agente"/>
                                <f:selectItem itemValue="5" itemLabel="Admin"/>
                            </h:selectOneMenu>
                        </div>
                        <div class="flex gap-3">
                            <h:commandButton action="#{adminBean.registrarUsuario}" value="Guardar"
                                class="flex-1 bg-gray-900 text-white py-2 rounded-lg text-sm font-medium"/>
                            <button type="button" onclick="closeModal('usuarioModal')" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Cancelar</button>
                        </div>
                    </div>
                </h:form>
            </div>
        </div>

        <script>
            function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
            function closeModal(id) { document.getElementById(id).classList.remove('flex'); document.getElementById(id).classList.add('hidden'); }
        </script>
    </ui:define>
</ui:composition>
</html>
