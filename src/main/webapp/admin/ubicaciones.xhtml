<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<ui:composition template="/WEB-INF/templates/plantilla.xhtml">
    <ui:define name="titulo">#{msg['admin.ubicaciones']} - #{msg['app.titulo']}</ui:define>
    <ui:define name="contenido">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-900">#{msg['admin.ubicaciones']}</h1>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
                <a href="#{request.contextPath}/admin/ubicaciones.xhtml?tipo=DEPARTAMENTO"
                   class="px-4 py-2 rounded-lg text-sm #{param.tipo == 'PROVINCIA' or param.tipo == 'DISTRITO' ? '' : 'bg-gray-900 text-white' } #{param.tipo != 'PROVINCIA' and param.tipo != 'DISTRITO' ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-700'}">Departamentos</a>
                <a href="#{request.contextPath}/admin/ubicaciones.xhtml?tipo=PROVINCIA"
                   class="px-4 py-2 rounded-lg text-sm #{param.tipo == 'PROVINCIA' ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-700'}">Provincias</a>
                <a href="#{request.contextPath}/admin/ubicaciones.xhtml?tipo=DISTRITO"
                   class="px-4 py-2 rounded-lg text-sm #{param.tipo == 'DISTRITO' ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-700'}">Distritos</a>
                <button onclick="openModal('ubiModal')" class="px-4 py-2 rounded-lg text-sm bg-amber-500 text-white hover:bg-amber-600">+ Nueva</button>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">ID</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Nombre</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">C\u00F3digo Ubigeo</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Padre</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <c:forEach items="#{adminBean.listaUbicaciones}" var="u">
                                <tr class="border-t border-gray-50 hover:bg-gray-50">
                                    <td class="px-4 py-3">#{u.id}</td>
                                    <td class="px-4 py-3 font-medium">#{u.nombre}</td>
                                    <td class="px-4 py-3">#{u.codigoUbigeo}</td>
                                    <td class="px-4 py-3">#{u.parentNombre}</td>
                                    <td class="px-4 py-3">
                                        <div class="flex gap-2">
                                            <h:form style="display:inline">
                                                <h:commandButton action="#{adminBean.eliminarUbicacion(u.id, adminBean.tipoUbicacion)}" value="Eliminar"
                                                    class="text-xs px-2 py-1 rounded bg-red-50 text-red-600 hover:bg-red-100"/>
                                            </h:form>
                                        </div>
                                    </td>
                                </tr>
                            </c:forEach>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- New Location Modal -->
        <div id="ubiModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md">
                <h3 class="text-lg font-semibold mb-4">Nueva #{adminBean.tipoUbicacion}</h3>
                <h:form>
                    <div class="space-y-3">
                        <div><h:inputText value="#{adminBean.ubiForm.nombre}" placeholder="Nombre" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <div><h:inputText value="#{adminBean.ubiForm.codigoUbigeo}" placeholder="C\u00F3digo Ubigeo" class="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                        <c:if test="#{adminBean.tipoUbicacion == 'PROVINCIA' or adminBean.tipoUbicacion == 'DISTRITO'}">
                            <div>
                                <h:selectOneMenu value="#{adminBean.ubiForm.parentId}" class="w-full px-3 py-2 border rounded-lg text-sm">
                                    <f:selectItem itemValue="0" itemLabel="Seleccionar padre..."/>
                                    <c:forEach items="#{adminBean.listaPadres}" var="padre">
                                        <f:selectItem itemValue="#{padre.id}" itemLabel="#{padre.nombre}"/>
                                    </c:forEach>
                                </h:selectOneMenu>
                            </div>
                        </c:if>
                        <h:inputHidden value="#{adminBean.tipoUbicacion}" binding="#{adminBean.ubiForm.tipo}"/>
                        <div class="flex gap-3">
                            <h:commandButton action="#{adminBean.guardarUbicacion}" value="Guardar"
                                class="flex-1 bg-gray-900 text-white py-2 rounded-lg text-sm font-medium"/>
                            <button type="button" onclick="closeModal('ubiModal')" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Cancelar</button>
                        </div>
                    </div>
                </h:form>
            </div>
        </div>

        <script>
            function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
            function closeModal(id) { document.getElementById(id).classList.remove('flex'); document.getElementById(id).classList.add('hidden'); }
        </script>
    </ui:define>
</ui:composition>
</html>
