<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">
<ui:composition template="/WEB-INF/templates/plantilla.xhtml">
    <ui:define name="titulo">#{msg['usuario.favoritos']} - #{msg['app.titulo']}</ui:define>
    <ui:define name="contenido">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-6 font-playfair">#{msg['usuario.favoritos']}</h1>

            <c:if test="#{empty favoritoBean.listaFavoritos}">
                <div class="text-center py-16">
                    <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                    <p class="text-gray-500 mb-4">A\u00FAn no tienes favoritos</p>
                    <a href="#{request.contextPath}/propiedades.xhtml" class="text-gray-900 font-medium hover:underline">#{msg['menu.catalogo']}</a>
                </div>
            </c:if>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <c:forEach items="#{favoritoBean.listaFavoritos}" var="p">
                    <div class="bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all">
                        <div class="relative h-48 bg-gray-200">
                            <c:choose>
                                <c:when test="#{not empty p.fotoPrincipal}">
                                    <img src="#{p.fotoPrincipalUrl(request.contextPath)}" alt="#{p.titulo}" class="w-full h-full object-cover"/>
                                </c:when>
                                <c:otherwise>
                                    <div class="w-full h-full flex items-center justify-center text-gray-400">
                                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    </div>
                                </c:otherwise>
                            </c:choose>
                            <div class="absolute top-3 left-3"><span class="px-2 py-1 bg-amber-500 text-white text-xs font-semibold rounded-lg">#{p.operacion}</span></div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-semibold text-gray-900 mb-1 truncate">#{p.titulo}</h3>
                            <p class="text-sm text-gray-500 mb-2">#{p.distrito}, #{p.provincia}</p>
                            <p class="text-lg font-bold text-gray-900">$ #{p.precioUsd}</p>
                            <p class="text-xs text-gray-400 mb-3">S/ #{p.precioPen}</p>
                            <div class="flex gap-2">
                                <a href="#{request.contextPath}/detalle_propiedad.xhtml?id=#{p.id}"
                                   class="flex-1 text-center bg-gray-900 hover:bg-gray-800 text-white py-2 rounded-xl text-sm font-medium">#{msg['propiedad.ver']}</a>
                                <h:form style="display:inline">
                                    <h:commandButton action="#{favoritoBean.removerFavorito(p.id)}" value="✕"
                                        class="bg-red-50 hover:bg-red-100 text-red-500 px-3 py-2 rounded-xl text-sm"/>
                                </h:form>
                            </div>
                        </div>
                    </div>
                </c:forEach>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
